<!DOCTYPE html>
<html>
<head>
    <title>Safety Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>🤖 SafeHer AI Assistant</h1>

    <form method="POST">

        <input
            type="text"
            name="message"
            placeholder="Ask a safety question..."
            required>

        <button type="submit">
            Ask
        </button>

    </form>

    {% if response %}

    <div class="card">
        <h3>Response</h3>
        <p>{{response}}</p>
    </div>

    {% endif %}

</div>

</body>
</html>
